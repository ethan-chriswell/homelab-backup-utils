name: Build and Push Backup Images

on:
  push:
    branches: [main]
    paths:
      - "arr-backup/**"
      - "mealie-backup/**"
      - "common/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write


jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - folder: arr-backup
            image: arr-backup
          - folder: mealie-backup
            image: mealie-api-backup
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.folder }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.folder }}
          cache-to: type=gha,mode=max,scope=${{ matrix.folder }}
