version: "3.9"

# Example: mealie-backup-ui with S3-compatible secondary storage (MinIO).
#
# Secrets required before deploying:
#   mealie_api_token  — Mealie Settings → General → Security → API Key
#   s3_secret_key     — MinIO/S3 secret access key
#
#   docker secret create mealie_api_token -
#   docker secret create s3_secret_key -
#
# Adjust MEALIE_URL, S3_ENDPOINT, S3_BUCKET, and S3_ACCESS_KEY_ID to match
# your environment. For AWS S3, omit S3_ENDPOINT and S3_FORCE_PATH_STYLE.

secrets:
  mealie_api_token:
    external: true
  s3_secret_key:
    external: true

services:
  mealie-backup-ui:
    image: ghcr.io/ethan-chriswell/mealie-backup-ui:latest
    ports:
      - "3000:3000"
    secrets:
      - mealie_api_token
      - s3_secret_key
    environment:
      # ── Mealie connection ─────────────────────────────────────────────────
      MEALIE_URL: http://mealie_mealie:9000
      MEALIE_API_TOKEN_FILE: /run/secrets/mealie_api_token

      # ── Secondary storage: S3-compatible (e.g. MinIO) ────────────────────
      STORAGE_TYPE: s3
      S3_ENDPOINT: http://minio:9000          # omit for AWS S3
      S3_FORCE_PATH_STYLE: "true"            # required for MinIO; set false for AWS
      S3_BUCKET: backups
      S3_PREFIX: mealie/
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minio_admin
      S3_SECRET_ACCESS_KEY_FILE: /run/secrets/s3_secret_key

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/config"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      restart_policy:
        condition: any

# ── Variant: local filesystem storage ──────────────────────────────────────
#
# Replace the environment block above with:
#
#   environment:
#     MEALIE_URL: http://mealie_mealie:9000
#     MEALIE_API_TOKEN_FILE: /run/secrets/mealie_api_token
#     STORAGE_TYPE: local
#     LOCAL_STORAGE_PATH: /data/backups
#   volumes:
#     - mealie_backups:/data/backups
#
# And add a named volume:
#
# volumes:
#   mealie_backups:
#     driver: local
